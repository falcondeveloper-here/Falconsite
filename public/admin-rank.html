<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Rank Management</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #f0a500;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1f36;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 10px #f0a500aa;
    }
    th, td {
      padding: 12px 15px;
      border-bottom: 1px solid #333;
      text-align: left;
    }
    th {
      background: #11162a;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .roles-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    label {
      cursor: pointer;
      user-select: none;
      font-size: 14px;
    }
    input[type="checkbox"] {
      margin-right: 6px;
      cursor: pointer;
    }
    button.save-btn {
      background: #f0a500;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-weight: bold;
      color: #111;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button.save-btn:hover {
      background: #ffb347;
    }
    #message {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Admin Rank Management</h1>
  <table>
    <thead>
      <tr>
        <th>Username</th>
        <th>Roles</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="usersTableBody">
      <tr><td colspan="3" style="text-align:center;">Loading users...</td></tr>
    </tbody>
  </table>
  <div id="message"></div>

  <script>
    const rolesList = ["Ownership", "Developer", "Staff", "Team", "GangMode", "FactionMode", "HelperMode", "Ap"];
    const usersTableBody = document.getElementById("usersTableBody");
    const messageEl = document.getElementById("message");

    // Replace this with your admin username who has Ownership role
    const adminUsername = prompt("Enter your admin username:");

    async function fetchUsers() {
      messageEl.textContent = "";
      try {
        const res = await fetch("/api/admin/users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: adminUsername })
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || "Failed to fetch users");
        }
        const users = await res.json();
        renderUsers(users);
      } catch (err) {
        usersTableBody.innerHTML = `<tr><td colspan="3" style="color:#f55; text-align:center;">${err.message}</td></tr>`;
      }
    }

    function renderUsers(users) {
      if (users.length === 0) {
        usersTableBody.innerHTML = `<tr><td colspan="3" style="text-align:center;">No users found.</td></tr>`;
        return;
      }
      usersTableBody.innerHTML = "";
      users.forEach(user => {
        const tr = document.createElement("tr");

        // Username cell
        const tdUsername = document.createElement("td");
        tdUsername.textContent = user.username;
        tr.appendChild(tdUsername);

        // Roles cell with checkboxes
        const tdRoles = document.createElement("td");
        const rolesContainer = document.createElement("div");
        rolesContainer.className = "roles-container";

        rolesList.forEach(role => {
          const label = document.createElement("label");
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = role;
          checkbox.checked = user.roles.includes(role);
          label.appendChild(checkbox);
          label.appendChild(document.createTextNode(role));
          rolesContainer.appendChild(label);
        });

        tdRoles.appendChild(rolesContainer);
        tr.appendChild(tdRoles);

        // Action cell with Save button
        const tdAction = document.createElement("td");
        const saveBtn = document.createElement("button");
        saveBtn.textContent = "Save";
        saveBtn.className = "save-btn";
        saveBtn.addEventListener("click", () => saveRoles(user.username, rolesContainer));
        tdAction.appendChild(saveBtn);
        tr.appendChild(tdAction);

        usersTableBody.appendChild(tr);
      });
    }

    async function saveRoles(username, rolesContainer) {
      messageEl.textContent = "";
      const checkedRoles = Array.from(rolesContainer.querySelectorAll("input[type=checkbox]:checked")).map(cb => cb.value);
      try {
        const res = await fetch(`/api/admin/users/${encodeURIComponent(username)}/roles`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: adminUsername, roles: checkedRoles })
        });
        const result = await res.json();
        if (res.ok) {
          messageEl.style.color = "#afa";
          messageEl.textContent = `Roles updated for ${username}`;
        } else {
          messageEl.style.color = "#f55";
          messageEl.textContent = result.error || "Failed to update roles";
        }
      } catch {
        messageEl.style.color = "#f55";
        messageEl.textContent = "Network error";
      }
    }

    fetchUsers();
  </script>
</body>
</html>
