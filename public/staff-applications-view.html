<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Applications View</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0a0a0a; color: #fff; margin: 0; }
    header, footer { background: #111; padding: 15px; text-align: center; }
    table { width: 90%; margin: 30px auto; border-collapse: collapse; background: #1c1c1c; border-radius: 10px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    th { background: crimson; }
    tr:hover { background: #222; }
  </style>
</head>
<body>
  <header>
    <h1>Staff Applications</h1>
  </header>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Age</th>
        <th>Discord</th>
        <th>Role</th>
        <th>Experience</th>
        <th>Motivation</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="applicationsTable"></tbody>
  </table>

  <footer>
    <p>© 2025 Falcon Developer</p>
  </footer>

  <script>
    async function loadApplications() {
      const res = await fetch("/api/staff-applications");
      const data = await res.json();

      const tbody = document.getElementById("applicationsTable");
      tbody.innerHTML = data.map(app => `
        <tr>
          <td>${app.id}</td>
          <td>${app.username}</td>
          <td>${app.age}</td>
          <td>${app.discord}</td>
          <td>${app.role}</td>
          <td>${app.experience}</td>
          <td>${app.motivation}</td>
          <td>${app.date}</td>
        </tr>
      `).join("");
    }
    loadApplications();
  </script>
</body>
</html>
