<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Los Santos RP — Staff Applications</title>
  <style>
    body {
      margin:0; font-family:system-ui, sans-serif; background:#0b0f19; color:#fff;
    }
    .bg { position:fixed; inset:0; background:url("los-santos-bg.jpg") center/cover no-repeat; z-index:-1; }
    .bg::after { content:""; position:absolute; inset:0;
      background:linear-gradient(to bottom, rgba(0,0,0,.5), rgba(0,0,0,.7)); }

    .nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 22px; background:rgba(5,8,16,.8); backdrop-filter:blur(8px);
      border-bottom:1px solid rgba(255,255,255,.1);
    }
    .nav a { color:#fff; text-decoration:none; margin-left:18px; font-size:14px; opacity:.9; }
    .nav a:hover { opacity:1; }

    .container { width:min(900px,95%); margin:40px auto; }
    .panel {
      background:rgba(10,14,25,.72); border:1px solid rgba(255,255,255,.08);
      border-radius:16px; padding:22px; box-shadow:0 20px 48px rgba(0,0,0,.45);
      overflow-x:auto;
    }
    h3 { margin-top:0; }
    table { width:100%; border-collapse:collapse; margin-top:14px; }
    th, td {
      padding:10px; border:1px solid rgba(255,255,255,.15); text-align:left;
    }
    th { background:rgba(255,255,255,.05); }
    tr:nth-child(even) { background:rgba(255,255,255,.02); }
    .muted { opacity:.8; font-size:14px; margin-top:10px; text-align:center; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <header class="nav">
    <div><strong>Los Santos RP</strong></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="aboutus.html">About</a>
      <a href="staff-application.html">Apply</a>
      <a href="staff-applications-view.html" aria-current="page">View</a>
    </nav>
  </header>

  <main class="container">
    <section class="panel">
      <h3>📋 Staff Applications</h3>
      <table id="applicationsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Discord</th>
            <th>Role</th>
            <th>Experience</th>
            <th>Motivation</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="8" class="muted">Loading applications...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    const tbody = document.querySelector("#applicationsTable tbody");

    async function loadApplications() {
      try {
        const res = await fetch("/api/staff-applications");
        const data = await res.json();
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="muted">No applications yet.</td></tr>';
          return;
        }

        tbody.innerHTML = data.map(app => `
          <tr>
            <td>${app.id}</td>
            <td>${app.name}</td>
            <td>${app.age}</td>
            <td>${app.discord}</td>
            <td>${app.role}</td>
            <td>${app.experience}</td>
            <td>${app.motivation}</td>
            <td>${app.date}</td>
          </tr>
        `).join("");
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="8" class="muted">Error loading applications.</td></tr>';
      }
    }

    loadApplications();
  </script>
</body>
</html>
