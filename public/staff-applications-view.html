<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Los Santos Roleplay - Staff Applications</title>

  <!-- ====== Base Styles ====== -->
  <style>
    /* Reset */
    , ::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: #fff;
      background: #0b0f19;
      overflow-x: hidden;
    }

    /* Background */
    .bg {
      position: fixed; inset: 0;
      background: url('los-santos-bg.jpg') center/cover no-repeat;
      z-index: -3;
      transform: translateZ(0);
    }
    .bg::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,.25), rgba(0,0,0,.75) 60%);
      z-index: -2;
    }

    /* Navbar */
    .nav {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
      padding: 14px 22px;
      background: rgba(5,8,16,0.65);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
    }
    .brand img {
      width: 34px; height: 34px; object-fit: contain; display: block;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
    }
    .brand .name {
      font-weight: 800; letter-spacing: .4px;
      text-transform: uppercase;
      font-size: 15px;
    }
    .nav-links {
      display: flex; align-items: center; gap: 22px;
    }
    .nav a {
      color: #fff; text-decoration: none; font-size: 14.5px; opacity: .9;
      transition: opacity .2s ease, transform .2s ease;
    }
    .nav a:hover { opacity: 1; transform: translateY(-1px); }
    .btn-login {
      padding: 8px 14px; border-radius: 10px;
      background: linear-gradient(135deg, #f0a500, #ff7b00);
      color: #111; font-weight: 700;
      box-shadow: 0 6px 18px rgba(240,165,0,.35);
    }

    /* Mobile toggle */
    .toggle {
      display: none; width: 42px; height: 42px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px; background: transparent; color: #fff;
    }
    .mobile {
      display: none; position: absolute; left: 0; right: 0; top: 58px;
      background: rgba(5,8,16,0.92); backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 12px 18px;
    }
    .mobile a { display: block; padding: 12px 2px; }

    /* Section for staff applications */
    .section {
      padding: 54px 18px;
    }
    .container {
      width: min(1100px, 92%); margin: 0 auto;
    }
    .title {
      font-size: clamp(20px, 2.6vw, 28px);
      text-align: center; margin-bottom: 26px;
      text-shadow: 0 8px 28px rgba(0,0,0,.6);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }
    .card {
      background: rgba(10,14,25,.7);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 22px;
      backdrop-filter: blur(6px);
      transform-style: preserve-3d;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
      will-change: transform;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 48px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.06) inset;
      background: rgba(10,14,25,.82);
    }
    .card h3 { margin: 6px 0 10px; color: #f0a500; font-size: 18px; }
    .card p { opacity: .9; line-height: 1.6; font-size: 14.5px; white-space: pre-wrap; }

    /* Scroll reveal base state */
    .reveal { opacity: 0; transform: translateY(14px); }
    .reveal.in { opacity: 1; transform: none; transition: opacity .7s ease, transform .7s ease; }

    /* No applications message */
    .no-apps {
      text-align: center;
      font-size: 20px;
      opacity: 0.85;
      margin-top: 40px;
    }

    /* Footer */
    .footer {
      padding: 24px; text-align: center; opacity: .8; font-size: 13.5px;
    }

    /* Keyframes */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 980px) {
      .nav-links { display: none; }
      .toggle { display: inline-grid; place-items: center; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="bg" aria-hidden="true"></div>

  <!-- ====== Navbar ====== -->
  <header class="nav">
    <div class="brand">
      <img src="los-santos-logo.png" alt="Los Santos Logo" />
      <span class="name">Los Santos RP</span>
    </div>

    <nav class="nav-links" aria-label="Primary">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="stats.html">Stats</a>
      <a href="#join">Join</a>
      <a href="#contact">Contact</a>
      <a class="btn-login" href="#login">Login</a>
    </nav>

    <button class="toggle" id="navToggle" aria-label="Open menu">☰</button>
    <nav class="mobile" id="mobileMenu" aria-label="Mobile">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="stats.html">Stats</a>
      <a href="#join">Join</a>
      <a href="#contact">Contact</a>
      <a class="btn-login" href="#login">Login</a>
    </nav>
  </header>

  <!-- ====== Staff Applications Section ====== -->
  <section class="section" id="staff-applications">
    <div class="container">
      <h2 class="title">📝 Staff Applications</h2>
      <div class="grid" id="applicationsGrid" aria-live="polite" aria-busy="true">
        <!-- Application cards will be inserted here -->
      </div>
      <p class="no-apps" id="noApplicationsMessage" style="display:none;">🚫 No applications yet.</p>
    </div>
  </section>

  <footer class="footer">© <span id="year"></span> Los Santos Roleplay. All rights reserved.</footer>

  <!-- ====== 3D & Interactions ====== -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    // ===== Mobile menu
    const navToggle = document.getElementById('navToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    navToggle.addEventListener('click', () => {
      const open = mobileMenu.style.display === 'block';
      mobileMenu.style.display = open ? 'none' : 'block';
      navToggle.setAttribute('aria-expanded', String(!open));
    });

    // ===== Year
    document.getElementById('year').textContent = new Date().getFullYear();

    // ===== Scroll reveal
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.15 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    // ===== Parallax tilt on cards
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const r = card.getBoundingClientRect();
        const x = e.clientX - r.left, y = e.clientY - r.top;
        const rx = ((y / r.height) - 0.5) * -8;
        const ry = ((x / r.width) - 0.5) *  8;
        card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) translateY(-6px) scale(1.02)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = '';
      });
    });

    // ===== THREE.JS Scene (simple model + particles)
    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    function resize() {
      const w = canvas.clientWidth || canvas.parentElement.clientWidth;
      const h = canvas.clientHeight || canvas.parentElement.clientHeight;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 1000);
    camera.position.set(0, 1.1, 3.6);

    // Lights
    const hemi = new THREE.HemisphereLight(0xffe0b2, 0x202040, 0.8);
    const dir = new THREE.DirectionalLight(0xffffff, 1.1);
    dir.position.set(3, 5, 2);
    scene.add(hemi, dir);

    // Particles (city glow)
    const pGeo = new THREE.BufferGeometry();
    const COUNT = 600;
    const positions = new Float32Array(COUNT * 3);
    for (let i=0; i<COUNT; i++) {
      positions[i*3]   = (Math.random()-0.5) * 20;
      positions[i*3+1] = Math.random() * 3 + 0.1;
      positions[i*3+2] = (Math.random()-0.5) * 20;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const pMat = new THREE.PointsMaterial({ size: 0.03, transparent: true, opacity: 0.8 });
    const points = new THREE.Points(pGeo, pMat);
    scene.add(points);

    // Ground plane (subtle)
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(30, 64),
      new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.15 })
    );
    ground.rotation.x = -Math.PI/2;
    ground.position.y = -0.2;
    scene.add(ground);

    // Load a GLTF model (free sample)
    const loader = new THREE.GLTFLoader();
    const MODEL_URL = "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF/Duck.gltf";
    let modelGroup = new THREE.Group();
    scene.add(modelGroup);

    loader.load(MODEL_URL, (gltf) => {
      const m = gltf.scene;
      m.scale.set(1.6, 1.6, 1.6);
      m.position.set(0, 0.5, 0);
      modelGroup.add(m);
    }, undefined, (err) => console.warn('GLTF load error:', err));

    // Animate
    const clock = new THREE.Clock();
    function tick() {
      const t = clock.getElapsedTime();
      modelGroup.rotation.y = t * 0.6;
      modelGroup.position.y = Math.sin(t*1.4) * 0.15 + 0.2;
      points.rotation.y = t * 0.05;
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }

    // Init sizes
    function setCanvasHeight() {
      const hero = document.querySelector('.hero');
      if (hero) {
        canvas.style.width = '100%';
        canvas.style.height = hero.getBoundingClientRect().height + 'px';
      }
      resize();
    }
    window.addEventListener('resize', () => { setCanvasHeight(); resize(); });
    setCanvasHeight();
    tick();

    // ===== Fetch and display staff applications =====
    const applicationsGrid = document.getElementById('applicationsGrid');
    const noApplicationsMessage = document.getElementById('noApplicationsMessage');

    async function fetchApplications() {
      applicationsGrid.setAttribute('aria-busy', 'true');
      try {
        const res = await fetch('/api/staff-applications');
        if (!res.ok) throw new Error('Network response was not ok');
        const data = await res.json();

        applicationsGrid.innerHTML = '';
        if (!Array.isArray(data) || data.length === 0) {
          noApplicationsMessage.style.display = 'block';
        } else {
          noApplicationsMessage.style.display = 'none';
          data.forEach(app => {
            // Create card element
            const card = document.createElement('article');
            card.className = 'card reveal';
            // Build content - adjust fields as per expected API response
            // Assuming each application has: id, name, position, message, dateSubmitted
            const name = app.name || 'Unknown Applicant';
            const position = app.position || 'Unknown Position';
            const message = app.message || 'No message provided.';
            const date = app.dateSubmitted ? new Date(app.dateSubmitted).toLocaleDateString() : 'Unknown date';

            card.innerHTML = `
              <h3>👤 ${name}</h3>
              <p><strong>Position:</strong> ${position}</p>
              <p><strong>Submitted:</strong> ${date}</p>
              <p>${message}</p>
            `;
            applicationsGrid.appendChild(card);
            io.observe(card);
            // Add parallax tilt event listeners for new cards
            card.addEventListener('mousemove', (e) => {
              const r = card.getBoundingClientRect();
              const x = e.clientX - r.left, y = e.clientY - r.top;
              const rx = ((y / r.height) - 0.5) * -8;
              const ry = ((x / r.width) - 0.5) *  8;
              card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) translateY(-6px) scale(1.02)`;
            });
            card.addEventListener('mouseleave', () => {
              card.style.transform = '';
            });
          });
        }
      } catch (error) {
        console.error('Failed to fetch staff applications:', error);
        applicationsGrid.innerHTML = '';
        noApplicationsMessage.textContent = '⚠️ Failed to load applications.';
        noApplicationsMessage.style.display = 'block';
      } finally {
        applicationsGrid.setAttribute('aria-busy', 'false');
      }
    }

    fetchApplications();
  </script>
</body>
</html>
