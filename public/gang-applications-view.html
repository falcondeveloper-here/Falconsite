<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gang Applications - Los Santos RP</title>
  <style>
    /* Same styling as helper-applications-view.html */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: ui-sans-serif, system-ui, Roboto, Arial, sans-serif;
      color: #fff;
      background: #0b0f19;
      overflow-x: hidden;
    }
    .bg {
      position: fixed; inset: 0;
      background: url('los-santos-bg.jpg') center/cover no-repeat;
      z-index: -3;
      transform: translateZ(0);
    }
    .bg::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,.25), rgba(0,0,0,.75) 60%);
      z-index: -2;
    }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(5,8,16,0.65);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
    }
    .brand img { width:34px; height:34px; }
    .brand span {
      font-weight: 800; font-size: 15px; text-transform: uppercase;
      letter-spacing: .5px;
    }
    .nav-links {
      display: flex; gap: 26px;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none; font-size: 14px;
      color: #fff; opacity:.9; transition:.2s;
    }
    .nav-links a:hover { opacity:1; color:#f0a500; }
    .btn-login {
      padding: 8px 16px;
      border-radius: 12px;
      background: linear-gradient(135deg,#f0a500,#ff7b00);
      color:#111; font-weight:700;
      box-shadow: 0 4px 12px rgba(255,140,0,.35);
    }
    .toggle { display:none; cursor:pointer; font-size:22px; }
    .mobile {
      display:none; flex-direction: column;
      background: rgba(5,8,16,.95); backdrop-filter: blur(8px);
      padding: 14px 20px;
    }
    .mobile a {
      text-decoration:none; color:#fff;
      padding:12px 0; font-size:15px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .mobile a:last-child { border:0; }
    @media(max-width: 980px){
      .nav-links{display:none;}
      .toggle{display:block;}
    }
    .section {
      padding: 50px 18px;
    }
    .container {
      width: min(900px, 92%);
      margin: auto;
      background: rgba(10,14,25,.75);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:30px;
      backdrop-filter: blur(6px);
    }
    .container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #f0a500;
    }
    #applicationsContainer {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .application {
      background: rgba(10,14,25,0.85);
      border: 1px solid #f0a500;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 10px #f0a500aa;
    }
    .application h3 {
      margin: 0 0 10px 0;
      color: #ffb84d;
      font-size: 20px;
    }
    .application p {
      margin: 6px 0;
      white-space: pre-wrap;
      line-height: 1.4;
    }
    .no-apps {
      text-align: center;
      font-size: 18px;
      opacity: 0.7;
      margin-top: 40px;
    }
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <header>
    <div class="nav">
      <div class="brand">
        <img src="los-santos-logo.png" alt="logo"/>
        <span>Los Santos RP</span>
      </div>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/aboutus">About</a>
        <a href="/stats">Stats</a>
        <a href="/staff-application">Staff Application</a>
        <a href="/helper-application">Helper Application</a>
        <a href="/gang-application">Gang Application</a>
        <a href="/contact">Contact</a>
        <a class="btn-login" href="#">Login</a>
      </nav>
      <div class="toggle" id="navToggle">☰</div>
    </div>
    <nav class="mobile" id="mobileMenu">
      <a href="/">Home</a>
      <a href="/aboutus">About</a>
      <a href="/stats">Stats</a>
      <a href="/staff-application">Staff Application</a>
      <a href="/helper-application">Helper Application</a>
      <a href="/gang-application">Gang Application</a>
      <a href="/contact">Contact</a>
      <a class="btn-login" href="#">Login</a>
    </nav>
  </header>

  <section class="section">
    <div class="container">
      <h2>Gang Applications</h2>
      <div id="applicationsContainer">
        <p class="no-apps" id="noAppsMsg" style="display:none;">No applications submitted yet.</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    © <span id="year"></span> Los Santos Roleplay. All rights reserved.
  </footer>

  <script>
    const navToggle = document.getElementById('navToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    navToggle.addEventListener('click', () => {
      mobileMenu.style.display = mobileMenu.style.display === 'flex' ? 'none' : 'flex';
    });

    document.getElementById('year').textContent = new Date().getFullYear();

    async function loadApplications() {
      const container = document.getElementById('applicationsContainer');
      const noAppsMsg = document.getElementById('noAppsMsg');
      try {
        const response = await fetch('/api/gang-applications');
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const applications = await response.json();

        if (applications.length === 0) {
          noAppsMsg.style.display = 'block';
          container.innerHTML = '';
          return;
        } else {
          noAppsMsg.style.display = 'none';
        }

        container.innerHTML = ''; // Clear container

        // applications are sorted newest first by server
        applications.forEach((app, index) => {
          const appDiv = document.createElement('div');
          appDiv.className = 'application';
          appDiv.innerHTML = `
            <h3>#${index + 1} - ${app.username} (Age: ${app.age})</h3>
            <p><strong>Discord:</strong> ${app.discord}</p>
            <p><strong>Gang Name:</strong> ${app.gangName}</p>
            <p><strong>Previous Experience:</strong><br>${app.experience}</p>
            <p><strong>Motivation:</strong><br>${app.motivation}</p>
            <p><em>Submitted: ${new Date(app.date).toLocaleString()}</em></p>
          `;
          container.appendChild(appDiv);
        });
      } catch (error) {
        container.innerHTML = `<p style="color:#ff5555; text-align:center; margin-top:40px; font-weight:bold;">Error loading applications: ${error.message}</p>`;
      }
    }

    window.addEventListener('DOMContentLoaded', loadApplications);
  </script>
</body>
</html>
