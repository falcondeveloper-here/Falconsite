<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Application</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0a0a0a; color: #fff; margin: 0; }
    header, footer { background: #111; padding: 15px; text-align: center; }
    form { max-width: 500px; margin: 30px auto; padding: 20px; background: #1c1c1c; border-radius: 10px; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none; }
    button { margin-top: 20px; padding: 12px; background: crimson; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    button:hover { background: darkred; transform: scale(1.05); transition: 0.3s; }
  </style>
</head>
<body>
  <header>
    <h1>Staff Application</h1>
  </header>

  <form id="applicationForm">
    <label>Username</label>
    <input type="text" name="username" required>

    <label>Age</label>
    <input type="number" name="age" required>

    <label>Discord</label>
    <input type="text" name="discord" required>

    <label>Role Applying For</label>
    <input type="text" name="role" required>

    <label>Experience</label>
    <textarea name="experience" required></textarea>

    <label>Motivation</label>
    <textarea name="motivation" required></textarea>

    <button type="submit">Submit Application</button>
  </form>

  <footer>
    <p>© 2025 Falcon Developer</p>
  </footer>

  <script>
    document.getElementById("applicationForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      const res = await fetch("/api/staff-applications", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });

      if (res.ok) {
        alert("Application submitted successfully!");
        e.target.reset();
      } else {
        alert("Error submitting application.");
      }
    });
  </script>
</body>
</html>
