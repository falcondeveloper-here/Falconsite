<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Helper Applications - Los Santos RP</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #f0a500;
      margin-bottom: 30px;
    }
    #applicationsContainer {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .application {
      background: rgba(10,14,25,0.85);
      border: 1px solid #f0a500;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 10px #f0a500aa;
    }
    .application h2 {
      margin: 0 0 10px 0;
      color: #ffb84d;
      font-size: 20px;
    }
    .application p {
      margin: 6px 0;
      white-space: pre-wrap;
      line-height: 1.4;
    }
    .no-apps {
      text-align: center;
      font-size: 18px;
      opacity: 0.7;
      margin-top: 40px;
    }
    .error {
      color: #ff5555;
      text-align: center;
      margin-top: 40px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Helper Applications</h1>
  <div id="applicationsContainer">
    <p class="no-apps" id="noAppsMsg" style="display:none;">No applications submitted yet.</p>
  </div>

  <script>
    async function loadApplications() {
      const container = document.getElementById('applicationsContainer');
      const noAppsMsg = document.getElementById('noAppsMsg');
      try {
        const response = await fetch('/api/helper-applications');
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const applications = await response.json();

        if (applications.length === 0) {
          noAppsMsg.style.display = 'block';
          return;
        } else {
          noAppsMsg.style.display = 'none';
        }

        container.innerHTML = ''; // Clear container

        applications.forEach((app, index) => {
          const appDiv = document.createElement('div');
          appDiv.className = 'application';
          appDiv.innerHTML = `
            <h2>#${index + 1} - ${app.username} (Age: ${app.age})</h2>
            <p><strong>Discord:</strong> ${app.discord}</p>
            <p><strong>Previous Experience:</strong><br>${app.experience}</p>
            <p><strong>Motivation:</strong><br>${app.motivation}</p>
            <p><em>Submitted: ${new Date(app.date).toLocaleString()}</em></p>
          `;
          container.appendChild(appDiv);
        });
      } catch (error) {
        container.innerHTML = `<p class="error">Error loading applications: ${error.message}</p>`;
      }
    }

    window.addEventListener('DOMContentLoaded', loadApplications);
  </script>
</body>
</html>
