<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gang Application - Los Santos RP</title>
  <style>
    /* Use the same styles as helper-application.html for consistency */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, Roboto, Arial, sans-serif;
      background: #0b0f19;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .bg {
      position: fixed; inset: 0;
      background: url('los-santos-bg.jpg') center/cover no-repeat;
      z-index: -3;
      transform: translateZ(0);
    }
    .bg::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,.35), rgba(0,0,0,.8) 65%);
      z-index: -2;
    }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(5,8,16,0.65);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
    }
    .brand img { width:34px; height:34px; }
    .brand span {
      font-weight: 800; font-size: 15px; text-transform: uppercase;
      letter-spacing: .5px;
    }
    .nav-links {
      display: flex; gap: 26px;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none; font-size: 14px;
      color: #fff; opacity:.9; transition:.2s;
    }
    .nav-links a:hover { opacity:1; color:#f0a500; }
    .btn-login {
      padding: 8px 16px;
      border-radius: 12px;
      background: linear-gradient(135deg,#f0a500,#ff7b00);
      color:#111; font-weight:700;
      box-shadow: 0 4px 12px rgba(255,140,0,.35);
    }
    .toggle { display:none; cursor:pointer; font-size:22px; }
    .mobile {
      display:none; flex-direction: column;
      background: rgba(5,8,16,.95); backdrop-filter: blur(8px);
      padding: 14px 20px;
    }
    .mobile a {
      text-decoration:none; color:#fff;
      padding:12px 0; font-size:15px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .mobile a:last-child { border:0; }
    @media(max-width: 980px){
      .nav-links{display:none;}
      .toggle{display:block;}
    }
    .section {
      padding: 50px 18px;
    }
    .container {
      width: min(800px, 92%);
      margin: auto;
      background: rgba(10,14,25,.75);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:30px;
      backdrop-filter: blur(6px);
    }
    .container h2 { text-align:center; margin-bottom:20px; color:#f0a500; }
    form { display:grid; gap:18px; }
    label { font-size:14px; opacity:.9; margin-bottom:4px; display:block; }
    input, textarea {
      width:100%; padding:12px 14px;
      border-radius:10px; border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.08); color:#fff;
      font-size:14px;
    }
    textarea { resize: vertical; min-height: 90px; }
    button {
      padding:14px; border-radius:12px; border:0;
      background:linear-gradient(135deg,#f0a500,#ff7b00);
      color:#111; font-weight:800; cursor:pointer;
      box-shadow:0 8px 20px rgba(255,140,0,.35);
      transition:transform .2s;
    }
    button:hover { transform:translateY(-2px) scale(1.01); }
    .footer { text-align:center; padding:20px; font-size:13px; opacity:.8; }
  </style>
</head>
<body>
  <div class="bg"></div>

  <header>
    <div class="nav">
      <div class="brand">
        <img src="los-santos-logo.png" alt="logo"/>
        <span>Los Santos RP</span>
      </div>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/aboutus">About</a>
        <a href="/stats">Stats</a>
        <a href="/staff-application">Staff Application</a>
        <a href="/helper-application">Helper Application</a>
        <a href="/gang-application">Gang Application</a>
        <a href="/contact">Contact</a>
        <a class="btn-login" href="#">Login</a>
      </nav>
      <div class="toggle" id="navToggle">☰</div>
    </div>
    <nav class="mobile" id="mobileMenu">
      <a href="/">Home</a>
      <a href="/aboutus">About</a>
      <a href="/stats">Stats</a>
      <a href="/staff-application">Staff Application</a>
      <a href="/helper-application">Helper Application</a>
      <a href="/gang-application">Gang Application</a>
      <a href="/contact">Contact</a>
      <a class="btn-login" href="#">Login</a>
    </nav>
  </header>

  <section class="section">
    <div class="container">
      <h2>Gang Application Form</h2>
      <form id="gangForm">
        <label for="username">Full Name</label>
        <input id="username" name="username" required />

        <label for="age">Age</label>
        <input id="age" name="age" type="number" required />

        <label for="discord">Discord Username</label>
        <input id="discord" name="discord" required />

        <label for="gangName">Gang Name</label>
        <input id="gangName" name="gangName" required />

        <label for="experience">Previous Experience</label>
        <textarea id="experience" name="experience" required></textarea>

        <label for="motivation">Why do you want to join this gang?</label>
        <textarea id="motivation" name="motivation" required></textarea>

        <button type="submit">Submit Application</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    © <span id="year"></span> Los Santos Roleplay. All rights reserved.
  </footer>

  <script>
    const navToggle = document.getElementById('navToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    navToggle.addEventListener('click', () => {
      mobileMenu.style.display = mobileMenu.style.display === 'flex' ? 'none' : 'flex';
    });

    document.getElementById('year').textContent = new Date().getFullYear();

    document.getElementById("gangForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());

      try {
        const res = await fetch("/api/gang-applications", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify(data)
        });
        if(res.ok){
          alert("Gang application submitted successfully!");
          e.target.reset();
        } else {
          const err = await res.json();
          alert("Error: " + (err.error || "Unknown error"));
        }
      } catch (err) {
        alert("Network error submitting application.");
      }
    });
  </script>
</body>
        </html>
