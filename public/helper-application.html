<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Helper Application - Los Santos RP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      margin: 0; padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: rgba(10,14,25,0.85);
      padding: 20px;
      border-radius: 10px;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      background: rgba(255,255,255,0.1);
      color: white;
    }
    textarea { resize: vertical; min-height: 90px; }
    button {
      margin-top: 20px;
      padding: 12px 20px;
      background: #f0a500;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: #111;
      font-size: 16px;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #ff7b00;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Helper Application</h1>
    <form id="helperForm">
      <label for="username">Full Name</label>
      <input id="username" name="username" required />

      <label for="age">Age</label>
      <input id="age" name="age" type="number" required />

      <label for="discord">Discord Username</label>
      <input id="discord" name="discord" required />

      <label for="experience">Previous Experience</label>
      <textarea id="experience" name="experience" required></textarea>

      <label for="motivation">Why do you want to be a helper?</label>
      <textarea id="motivation" name="motivation" required></textarea>

      <button type="submit">Submit Application</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('helperForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());

      try {
        const res = await fetch('/api/helper-applications', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (res.ok) {
          alert('Application submitted successfully!');
          form.reset();
        } else {
          const err = await res.json();
          alert('Error: ' + (err.error || 'Unknown error'));
        }
      } catch (error) {
        alert('Network error: ' + error.message);
      }
    });
  </script>
</body>
</html>
